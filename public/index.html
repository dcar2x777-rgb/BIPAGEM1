<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conferidor de Pacotes por Rota</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body { background:#000; color:#4ade80; font-family: Arial, sans-serif; }
    .hidden { display:none !important; }
    .fallback-box { word-break: break-all; font-size: 12px; color: #111; max-width: 180px; }
  </style>
</head>

<body class="bg-black text-green-400 min-h-screen p-6">
  <div id="appPrincipal" class="max-w-7xl mx-auto space-y-6">

    <header class="bg-black border border-green-500 rounded-2xl shadow p-6">
      <h1 class="text-3xl font-bold text-green-400">Conferidor de Pacotes por Rota</h1>
      <p class="text-green-300 mt-2">Múltiplos TXT + QR da rota + validação de pacotes</p>
      <p id="wsStatus" class="text-yellow-400 mt-2 text-sm">Conectando ao servidor...</p>
    </header>

    <section class="bg-black border border-green-500 rounded-2xl shadow p-6">
      <div class="flex flex-col md:flex-row gap-4 items-start md:items-center">
        <input id="txtFiles" type="file" accept=".txt" multiple class="border border-green-500 bg-black text-green-300 rounded-xl p-3 w-full" />
        <button type="button" onclick="importarRotas()" class="bg-green-500 text-black px-6 py-3 rounded-xl font-bold">Importar Rotas</button>
      </div>
    </section>

    <section>
      <h2 class="text-xl font-bold mb-4 text-green-400">Rotas Carregadas</h2>
      <div id="rotasContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    </section>

    <section class="bg-black border border-green-500 rounded-2xl shadow p-6">
      <h2 class="text-xl font-bold mb-4 text-green-400">Bipagem Manual / Teste</h2>

      <div class="grid md:grid-cols-2 gap-4">
        <select id="rotaSelecionada" class="border border-green-500 bg-black text-green-300 rounded-xl p-3">
          <option value="">Selecione uma rota</option>
        </select>

        <input id="codigoManual" type="text" placeholder="Cole QR / Código de barras / Digite manualmente" class="border border-green-500 bg-black text-green-300 rounded-xl p-3" />
      </div>

      <div class="mt-4 flex gap-4 flex-wrap">
        <button type="button" onclick="validarPacote()" class="bg-green-500 text-black px-6 py-3 rounded-xl font-bold">Validar Pacote</button>
        <button type="button" onclick="exportarCSV()" class="bg-white text-black px-6 py-3 rounded-xl font-bold">Gerar CSV</button>
      </div>

      <div id="resultado" class="mt-4 rounded-xl border border-green-500 p-4 bg-black text-green-300 font-bold">Aguardando leitura...</div>

      <div id="painelExportacao" class="hidden mt-4 border border-green-500 rounded-xl p-4 bg-black">
        <div class="flex items-center justify-between gap-4 flex-wrap mb-4">
          <h3 class="text-lg font-bold text-green-400">Conferência para Exportar CSV</h3>
          <button type="button" onclick="fecharPainelExportacao()" class="border border-green-500 px-4 py-2 rounded-xl text-green-300">Fechar</button>
        </div>

        <div id="resumoExportacao" class="mb-4 text-green-300 font-bold"></div>
        <p class="text-sm text-green-300 mb-2">Marque os códigos que você quer excluir antes de baixar.</p>
        <div id="listaExportacaoCompleta" class="border border-green-500 rounded-xl p-3 max-h-96 overflow-y-auto text-sm"></div>

        <button type="button" onclick="baixarCSV()" class="mt-4 bg-white text-black px-6 py-3 rounded-xl font-bold">Baixar CSV Final</button>
      </div>
    </section>

    <section class="bg-black border border-green-500 rounded-2xl shadow p-6">
      <h2 class="text-xl font-bold mb-4 text-green-400">Histórico Geral</h2>
      <div id="historico" class="space-y-2 text-sm text-green-300"></div>
    </section>
  </div>

<script>
'use strict';

let rotas = {};
let wsPainelPC = null;

function byId(id) {
  return document.getElementById(id);
}

function extrairIds(texto) {
  const encontrados = String(texto || '').match(/4\d{10}/g) || [];
  return Array.from(new Set(encontrados));
}

function extrairCodigo(valor) {
  const match = String(valor || '').match(/4\d{10}/);
  return match ? match[0] : null;
}

function safeId(nome) {
  return String(nome).replace(/[^a-zA-Z0-9_-]/g, '_');
}

function escapeHtml(valor) {
  return String(valor)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function criarObjetoRota(nome, ids) {
  return {
    nome: nome,
    ids: new Set(ids),
    bipados: new Set(),
    foraDeRota: 0,
    historico: []
  };
}

function importarRotas() {
  const input = byId('txtFiles');
  const files = input ? input.files : [];

  if (!files || !files.length) {
    alert('Selecione um ou mais arquivos TXT');
    return;
  }

  limparTelaRotas();

  Array.from(files).forEach(file => {
    const reader = new FileReader();

    reader.onload = function(e) {
      const nome = file.name.replace(/\.txt$/i, '');
      const ids = extrairIds(e.target.result);

      rotas[nome] = criarObjetoRota(nome, ids);
      criarCardRota(nome);
      adicionarSelectRota(nome);
    };

    reader.onerror = function() {
      alert('Erro ao ler o arquivo: ' + file.name);
    };

    reader.readAsText(file);
  });
}

function limparTelaRotas() {
  rotas = {};
  byId('rotasContainer').innerHTML = '';
  byId('rotaSelecionada').innerHTML = '<option value="">Selecione uma rota</option>';
  byId('historico').innerHTML = '';
  byId('painelExportacao').classList.add('hidden');
  mostrarResultado('Aguardando leitura...', 'normal');
}

function criarCardRota(nome) {
  const rota = rotas[nome];
  const container = byId('rotasContainer');
  const idSeguro = safeId(nome);

  if (!rota || !container) return;

  const card = document.createElement('div');
  card.className = 'bg-black rounded-2xl shadow p-5 border border-green-500';
  card.id = `card-${idSeguro}`;

  card.innerHTML = `
    <h3 class="text-lg font-bold text-green-400">${escapeHtml(nome)}</h3>
    <p>IDs válidos: ${rota.ids.size}</p>
    <p>Bipados: <span id="bipados-${idSeguro}">0</span></p>
    <p class="text-red-500 font-bold">Fora de rota: <span id="fora-${idSeguro}">0</span></p>
    <p>Faltantes: <span id="faltantes-${idSeguro}">${rota.ids.size}</span></p>

    <div class="mt-4">
      <p class="font-medium mb-2">QR da rota</p>
      <div id="qr-${idSeguro}" class="bg-white p-3 rounded-xl border min-h-[220px] flex items-center justify-center"></div>
    </div>

    <div class="mt-4">
      <p class="font-medium mb-2">IDs Faltantes da Rota</p>
      <div id="ids-${idSeguro}" class="border border-green-500 rounded-xl p-3 min-h-[180px] max-h-[260px] overflow-y-auto text-sm bg-black text-green-300"></div>
    </div>
  `;

  container.appendChild(card);
  atualizarIdsNoCard(nome);
  gerarQrRota(nome, idSeguro);
}

function gerarQrRota(nome, idSeguro) {
  const qrBox = byId(`qr-${idSeguro}`);
  if (!qrBox) return;

  qrBox.innerHTML = '';

  // QR correto para o celular: abre scanner.html já com a rota
  const url = `${location.origin}/scanner.html?rota=${encodeURIComponent(nome)}`;

  try {
    if (typeof QRCode === 'function') {
      new QRCode(qrBox, { text: url, width: 180, height: 180 });
    } else {
      qrBox.innerHTML = `<div class="fallback-box">QR não carregou<br>${escapeHtml(url)}</div>`;
    }
  } catch (erro) {
    console.error('Erro QR:', erro);
    qrBox.innerHTML = `<div class="fallback-box">Erro QR<br>${escapeHtml(url)}</div>`;
  }
}

function atualizarIdsNoCard(nome) {
  const rota = rotas[nome];
  if (!rota) return;

  const idSeguro = safeId(nome);
  const idsBox = byId(`ids-${idSeguro}`);
  if (!idsBox) return;

  const faltantes = Array.from(rota.ids).filter(id => !rota.bipados.has(id));

  if (!faltantes.length) {
    idsBox.innerHTML = '<div>✅ Todos os pacotes foram bipados</div>';
    return;
  }

  idsBox.innerHTML = faltantes.map(id => `<div>${escapeHtml(id)}</div>`).join('');
}

function adicionarSelectRota(nome) {
  const select = byId('rotaSelecionada');
  if (!select) return;

  const option = document.createElement('option');
  option.value = nome;
  option.textContent = nome;
  select.appendChild(option);
}

function validarPacote() {
  const nomeRota = byId('rotaSelecionada').value;
  const valorOriginal = byId('codigoManual').value.trim();
  const resultado = processarBipagem(nomeRota, valorOriginal, true);

  if (resultado) limparCampo();
}

function processarBipagem(nomeRota, valorOriginal, mostrarNoPainel) {
  if (!nomeRota) {
    alert('Selecione uma rota');
    return null;
  }

  if (!valorOriginal) {
    alert('Digite ou cole um código');
    return null;
  }

  const rota = rotas[nomeRota];
  if (!rota) {
    mostrarResultado(`❌ Rota não encontrada: ${nomeRota}`, 'red');
    return null;
  }

  const id = extrairCodigo(valorOriginal);

  if (!id) {
    if (mostrarNoPainel) mostrarResultado('❌ Inválido', 'red');
    registrar(nomeRota, '❌', 'INVÁLIDO', valorOriginal);
    return { status: 'INVÁLIDO', id: valorOriginal };
  }

  if (!rota.ids.has(id)) {
    rota.foraDeRota += 1;
    atualizar(nomeRota);
    if (mostrarNoPainel) mostrarResultado(`❌ Fora de rota: ${id}`, 'red');
    registrar(nomeRota, '❌', 'FORA DE ROTA', id);
    return { status: 'FORA DE ROTA', id: id };
  }

  if (rota.bipados.has(id)) {
    if (mostrarNoPainel) mostrarResultado(`⚠ Duplicado: ${id}`, 'yellow');
    registrar(nomeRota, '⚠', 'DUPLICADO', id);
    return { status: 'DUPLICADO', id: id };
  }

  rota.bipados.add(id);
  atualizar(nomeRota);
  if (mostrarNoPainel) mostrarResultado(`✅ OK: ${id}`, 'green');
  registrar(nomeRota, '✅', 'VÁLIDO', id);
  return { status: 'VÁLIDO', id: id };
}

function atualizar(nome) {
  const rota = rotas[nome];
  if (!rota) return;

  const idSeguro = safeId(nome);
  const bipados = byId(`bipados-${idSeguro}`);
  const fora = byId(`fora-${idSeguro}`);
  const faltantes = byId(`faltantes-${idSeguro}`);

  if (bipados) bipados.textContent = rota.bipados.size;
  if (fora) fora.textContent = rota.foraDeRota;
  if (faltantes) faltantes.textContent = rota.ids.size - rota.bipados.size;

  atualizarIdsNoCard(nome);
}

function mostrarResultado(texto, cor) {
  const box = byId('resultado');
  if (!box) return;

  const classes = {
    normal: 'bg-black text-green-300 border-green-500',
    green: 'bg-green-500 text-black border-green-500',
    yellow: 'bg-yellow-400 text-black border-yellow-400',
    red: 'bg-red-600 text-white border-red-600'
  };

  box.className = `mt-4 rounded-xl border p-4 font-bold ${classes[cor] || classes.normal}`;
  box.textContent = texto;
}

function registrar(nomeRota, simbolo, status, id) {
  const hora = new Date().toLocaleTimeString('pt-BR');
  const linha = `${hora} | ${nomeRota} | ${simbolo} ${id} | ${status}`;
  const historico = byId('historico');

  if (historico) {
    historico.innerHTML = `<div>${escapeHtml(linha)}</div>` + historico.innerHTML;
  }

  if (rotas[nomeRota]) {
    rotas[nomeRota].historico.push({
      hora: hora,
      status: status,
      id: String(id),
      excluir: false
    });
  }
}

function limparCampo() {
  const campo = byId('codigoManual');
  if (!campo) return;
  campo.value = '';
  campo.focus();
}

function exportarCSV() {
  const nomeRota = byId('rotaSelecionada').value;

  if (!nomeRota) {
    alert('Selecione uma rota antes de gerar o CSV');
    return;
  }

  abrirPainelExportacao(nomeRota);
}

function abrirPainelExportacao(nomeRota) {
  const rota = rotas[nomeRota];
  const painel = byId('painelExportacao');
  const resumo = byId('resumoExportacao');
  const lista = byId('listaExportacaoCompleta');

  if (!rota || !painel || !resumo || !lista) return;

  painel.dataset.rota = nomeRota;
  painel.classList.remove('hidden');

  const faltantes = Array.from(rota.ids).filter(id => !rota.bipados.has(id));
  const validos = rota.historico.filter(item => item.status === 'VÁLIDO').length;
  const duplicados = rota.historico.filter(item => item.status === 'DUPLICADO').length;
  const fora = rota.historico.filter(item => item.status === 'FORA DE ROTA').length;
  const invalidos = rota.historico.filter(item => item.status === 'INVÁLIDO').length;

  resumo.textContent = `Rota: ${rota.nome} | Leituras: ${rota.historico.length} | Válidos: ${validos} | Duplicados: ${duplicados} | Fora de rota: ${fora} | Inválidos: ${invalidos} | Faltantes: ${faltantes.length}`;

  if (!rota.historico.length) {
    lista.innerHTML = '<div class="text-yellow-400">Nenhuma bipagem feita nessa rota.</div>';
    return;
  }

  lista.innerHTML = rota.historico.map((item, index) => {
    let cor = 'text-green-300 border-green-900';
    let marcador = '✅';

    if (item.status === 'DUPLICADO') {
      cor = 'text-yellow-400 border-yellow-700';
      marcador = '⚠';
    }

    if (item.status === 'FORA DE ROTA' || item.status === 'INVÁLIDO') {
      cor = 'text-red-500 border-red-700';
      marcador = '❌';
    }

    const checked = item.excluir ? 'checked' : '';
    const itemId = escapeHtml(item.id);
    const itemHora = escapeHtml(item.hora);
    const itemStatus = escapeHtml(item.status);

    return `
      <div class="flex items-center justify-between gap-3 border-b py-2 ${cor}">
        <div>
          <div><strong>${marcador} ${itemId}</strong></div>
          <div class="text-xs">${itemHora} | ${itemStatus}</div>
        </div>
        <label class="flex items-center gap-2 text-xs cursor-pointer">
          <input type="checkbox" ${checked} onchange="marcarExcluirExportacao(${index}, this.checked)">
          Excluir
        </label>
      </div>
    `;
  }).join('');
}

function marcarExcluirExportacao(index, marcado) {
  const painel = byId('painelExportacao');
  const nomeRota = painel ? painel.dataset.rota : '';
  const rota = rotas[nomeRota];

  if (!rota || !rota.historico[index]) return;
  rota.historico[index].excluir = Boolean(marcado);
}

function fecharPainelExportacao() {
  const painel = byId('painelExportacao');
  if (painel) painel.classList.add('hidden');
}

function baixarCSV() {
  const painel = byId('painelExportacao');
  const nomeRota = painel ? painel.dataset.rota : '';
  const rota = rotas[nomeRota];

  if (!rota) return;

  const itens = rota.historico.filter(item => !item.excluir);

  if (!itens.length) {
    alert('Nenhum código selecionado para exportar');
    return;
  }

  const now = new Date();
  const linhas = ['date,time,time_zone,format,text,notes,favorite,date_utc,time_utc,metadata'];

  itens.forEach((item, i) => {
    const t = new Date(now.getTime() + i * 1000);
    const date = t.toISOString().slice(0, 10);
    const time = t.toTimeString().slice(0, 8);
    const utc = new Date(t.getTime() + 3 * 3600000);
    const dateUtc = utc.toISOString().slice(0, 10);
    const timeUtc = utc.toTimeString().slice(0, 8);
    const codigo = String(item.id).replace(/"/g, '""');
    const format = String(item.id).startsWith('{') ? 'QR_CODE' : 'CODE_128';

    linhas.push(`${date},${time},-03:00,${format},"${codigo}",,false,${dateUtc},${timeUtc},`);
  });

  const csv = linhas.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');

  a.href = url;
  a.download = `${safeId(rota.nome)}_codes_android.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function conectarPainelPC() {
  const status = byId('wsStatus');
  const protocolo = location.protocol === 'https:' ? 'wss://' : 'ws://';

  wsPainelPC = new WebSocket(protocolo + location.host);

  wsPainelPC.onopen = function() {
    console.log('✅ Painel PC conectado ao WebSocket');
    if (status) {
      status.textContent = 'Painel conectado ao servidor';
      status.className = 'text-green-400 mt-2 text-sm';
    }
  };

  wsPainelPC.onmessage = function(event) {
    let data;

    try {
      data = JSON.parse(event.data);
    } catch (e) {
      console.warn('Mensagem inválida:', event.data);
      return;
    }

    if (data.type !== 'scan') return;

    console.log('📦 Bipagem recebida no PC:', data);

    let rota = data.rota || '';
    const codigo = data.valorOriginal || data.valor || data.id || '';
    const socketId = data.socketId;

    if (!rota) {
      const select = byId('rotaSelecionada');
      rota = select ? select.value : '';
    }

    if (!rota || !codigo) {
      console.warn('Sem rota ou sem código:', data);
      enviarFeedbackCelular(socketId, 'red');
      return;
    }

    const resultado = processarBipagem(rota, codigo, true);

    let cor = 'red';

    if (resultado && resultado.status === 'VÁLIDO') cor = 'green';
    if (resultado && resultado.status === 'DUPLICADO') cor = 'yellow';
    if (resultado && resultado.status === 'FORA DE ROTA') cor = 'red';
    if (resultado && resultado.status === 'INVÁLIDO') cor = 'red';

    enviarFeedbackCelular(socketId, cor);
  };

  wsPainelPC.onerror = function(err) {
    console.warn('Erro WebSocket PC:', err);
    if (status) {
      status.textContent = 'Erro na conexão com servidor';
      status.className = 'text-red-400 mt-2 text-sm';
    }
  };

  wsPainelPC.onclose = function() {
    console.warn('PC desconectado. Reconectando...');
    if (status) {
      status.textContent = 'Reconectando ao servidor...';
      status.className = 'text-yellow-400 mt-2 text-sm';
    }
    setTimeout(conectarPainelPC, 1000);
  };
}

function enviarFeedbackCelular(socketId, cor) {
  if (!socketId) return;
  if (!wsPainelPC || wsPainelPC.readyState !== WebSocket.OPEN) return;

  wsPainelPC.send(JSON.stringify({
    type: 'resultado',
    socketId: socketId,
    cor: cor
  }));
}

function rodarTestesBasicos() {
  console.assert(extrairCodigo('ABC41234567890XYZ') === '41234567890', 'Teste extrairCodigo com texto');
  console.assert(extrairCodigo('12345678901') === null, 'Teste deve ignorar número que não começa com 4');
  console.assert(extrairIds('41234567890 41234567890 49876543210').length === 2, 'Teste extrairIds remove duplicados');

  const teste = criarObjetoRota('TESTE', ['41234567890']);
  console.assert(teste.ids.has('41234567890'), 'Teste criarObjetoRota cria Set de ids');
}

window.addEventListener('DOMContentLoaded', function() {
  rodarTestesBasicos();
  conectarPainelPC();
});
</script>
</body>
</html>
