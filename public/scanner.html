<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;background:black;color:lime;font-family:Arial;overflow:hidden}
#reader{width:100vw;height:65vh;background:black}
#manualArea{height:35vh;padding:10px;box-sizing:border-box;border-top:2px solid lime}
input{width:100%;box-sizing:border-box;padding:14px;font-size:18px;background:#000;color:lime;border:2px solid lime;border-radius:10px}
button{width:100%;margin-top:8px;padding:14px;font-size:18px;font-weight:bold;background:lime;color:black;border:0;border-radius:10px}
#status,#ultimoId,#operadorBox,#rotaBox{margin-top:7px;font-size:14px;color:yellow}
#flash{position:fixed;inset:0;background:transparent;pointer-events:none;z-index:999}
</style>
</head>

<body>

<div id="reader"></div>

<div id="manualArea">
  <input id="manualInput" placeholder="Digitar ID manualmente">
  <button onclick="enviarManual()">ENVIAR</button>
  <div id="rotaBox"></div>
  <div id="operadorBox"></div>
  <div id="ultimoId">Último ID: nenhum</div>
  <div id="status">Conectando...</div>
</div>

<div id="flash"></div>

<script>
const params = new URLSearchParams(location.search);
const rota = params.get("rota") || "";

let operador = localStorage.getItem("operadorScanner");

if(!operador){
  operador = prompt("Nome de quem vai bipar:") || "OPERADOR";
  localStorage.setItem("operadorScanner", operador);
}

document.getElementById("rotaBox").innerText = "Rota: " + (rota || "sem rota");
document.getElementById("operadorBox").innerText = "Operador: " + operador;

const statusBox = document.getElementById("status");
const ultimoIdBox = document.getElementById("ultimoId");
const flash = document.getElementById("flash");

let ws;
let qr;
let ultimo = "";
let tempo = 0;
let bloqueado = false;

function conectar(){
  const protocolo = location.protocol === "https:" ? "wss://" : "ws://";
  ws = new WebSocket(protocolo + location.host);

  ws.onopen = () => {
    status("Conectado ✔ Abrindo câmera...");
    iniciarCamera();
  };

  ws.onmessage = e => {
    let data;

    try{
      data = JSON.parse(e.data);
    }catch{
      return;
    }

    if(data.type !== "feedback") return;

    if(data.cor === "green"){
      feedback("green", 350, 100, 600, "OK ✔");
    }

    if(data.cor === "yellow"){
      feedback("yellow", 1000, [100,100,100], 1000, "Duplicado ⚠");
    }

    if(data.cor === "red"){
      feedback("red", 2000, [400,150,400,150,600], 2000, "Fora de rota / inválido ✖");
    }
  };

  ws.onclose = () => {
    status("Reconectando...");
    setTimeout(conectar,1000);
  };

  ws.onerror = () => {
    status("Erro de conexão");
  };
}

function iniciarCamera(){
  if(typeof Html5Qrcode === "undefined"){
    status("Biblioteca da câmera não carregou");
    return;
  }

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    {
      fps: 18,
      qrbox: { width: 360, height: 260 },
      aspectRatio: 1.777,
      disableFlip: false
    },
    txt => {
      if(bloqueado) return;

      const agora = Date.now();

      if(txt === ultimo && agora - tempo < 900) return;

      ultimo = txt;
      tempo = agora;

      enviar(txt);
    },
    () => {}
  ).then(()=>{
    status("Câmera aberta");
  }).catch(err=>{
    status("Erro câmera: " + err);
  });
}

function enviar(valor){
  if(!valor) return;

  if(!ws || ws.readyState !== WebSocket.OPEN){
    status("Sem conexão");
    return;
  }

  bloqueado = true;

  setTimeout(()=>{
    bloqueado = false;
  },2500);

  ultimoIdBox.innerText = "Último ID: " + valor;
  status("Lido. Validando...");

  ws.send(JSON.stringify({
    type:"scan",
    valor:valor,
    rota:rota,
    operador:operador
  }));
}

function enviarManual(){
  if(bloqueado) return;

  const input = document.getElementById("manualInput");
  const valor = input.value.trim();

  if(!valor) return;

  enviar(valor);
  input.value="";
}

function feedback(cor, tempoCor, vibracao, tempoBloqueio, textoStatus){
  bloqueado = true;

  if(cor === "green"){
    flash.style.background = "rgba(0,255,0,.70)";
  }

  if(cor === "yellow"){
    flash.style.background = "rgba(255,230,0,.85)";
  }

  if(cor === "red"){
    flash.style.background = "rgba(255,0,0,.90)";
  }

  status(textoStatus);
  vibrar(vibracao);

  setTimeout(()=>{
    flash.style.background = "transparent";
  },tempoCor);

  setTimeout(()=>{
    bloqueado = false;
    status("Pronto para próxima leitura");
  },tempoBloqueio);
}

function vibrar(padrao){
  if(navigator.vibrate){
    navigator.vibrate(padrao);
  }
}

function status(t){
  statusBox.innerText = t;
}

conectar();
</script>

</body>
</html>
