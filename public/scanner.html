<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  background:black;
  color:lime;
  font-family:Arial;
}

#reader{
  width:100vw;
  height:70vh;
}

#manualArea{
  padding:10px;
}

input{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  font-size:18px;
  background:#000;
  color:lime;
  border:2px solid lime;
  border-radius:10px;
}

button{
  width:100%;
  margin-top:8px;
  padding:14px;
  font-size:18px;
  font-weight:bold;
  background:lime;
  color:black;
  border:0;
  border-radius:10px;
}

#status{
  margin-top:8px;
  font-size:14px;
  color:yellow;
}

#flash{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:transparent;
  pointer-events:none;
  z-index:999;
}
</style>
</head>

<body>

<div id="reader"></div>

<div id="manualArea">
  <input id="manualInput" placeholder="Digitar ID manualmente">
  <button onclick="enviarManual()">ENVIAR</button>
  <div id="status">Conectando...</div>
</div>

<div id="flash"></div>

<script>
const params = new URLSearchParams(location.search);
const rota = params.get("rota") || "";

const statusBox = document.getElementById("status");
const flash = document.getElementById("flash");

let ws;
let ultimo = "";
let tempo = 0;
let bloqueado = false;

// conexão
function conectar(){
  const protocolo = location.protocol === "https:" ? "wss://" : "ws://";
  ws = new WebSocket(protocolo + location.host);

  ws.onopen = () => {
    status("Conectado ✔");
    iniciarCamera();
  };

  ws.onmessage = e => {
    const data = JSON.parse(e.data);

    if(data.type !== "feedback") return;

    if(data.cor === "green"){
      piscar("green", 300);
      vibrar(100);
    }

    if(data.cor === "yellow"){
      bloqueado = true;
      piscar("yellow", 1000);
      vibrar([100,100,100]);

      setTimeout(() => {
        bloqueado = false;
      }, 1000);
    }

    if(data.cor === "red"){
      bloqueado = true;
      piscar("red", 2000);
      vibrar([200,100,200]);

      setTimeout(() => {
        bloqueado = false;
      }, 2000);
    }
  };

  ws.onclose = () => {
    status("Reconectando...");
    setTimeout(conectar, 1000);
  };

  ws.onerror = () => {
    status("Erro de conexão");
  };
}

// câmera
function iniciarCamera(){
  if(typeof Html5Qrcode === "undefined"){
    status("Biblioteca da câmera não carregou");
    return;
  }

  Html5Qrcode.getCameras().then(cameras => {
    if(!cameras.length){
      status("Sem câmera");
      return;
    }

    const cam = cameras[cameras.length - 1].id;
    const qr = new Html5Qrcode("reader");

    qr.start(
      cam,
      { fps:8, qrbox:{width:250,height:250} },
      txt => {
        if(bloqueado) return;

        const agora = Date.now();

        if(txt === ultimo && agora - tempo < 1500) return;

        ultimo = txt;
        tempo = agora;

        enviar(txt);
      },
      () => {}
    ).then(() => {
      status("Câmera aberta");
    }).catch(err => {
      status("Erro câmera: " + err);
    });
  }).catch(err => {
    status("Permissão bloqueada: " + err);
  });
}

// enviar leitura
function enviar(valor){
  if(!valor) return;

  if(!ws || ws.readyState !== WebSocket.OPEN){
    status("Sem conexão");
    return;
  }

  ws.send(JSON.stringify({
    type:"scan",
    valor:valor,
    rota:rota
  }));
}

// manual
function enviarManual(){
  if(bloqueado) return;

  const input = document.getElementById("manualInput");
  const valor = input.value.trim();

  if(!valor) return;

  enviar(valor);
  input.value = "";
}

// feedback visual
function piscar(cor, tempoMs){
  flash.style.background =
    cor === "green" ? "rgba(0,255,0,.65)" :
    cor === "yellow" ? "rgba(255,255,0,.75)" :
    "rgba(255,0,0,.75)";

  setTimeout(() => {
    flash.style.background = "transparent";
  }, tempoMs);
}

// vibração
function vibrar(padrao){
  if(navigator.vibrate){
    navigator.vibrate(padrao);
  }
}

function status(t){
  statusBox.innerText = t;
}

conectar();
</script>

</body>
</html>
