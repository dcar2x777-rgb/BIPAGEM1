<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
html,body{
  margin:0;
  padding:0;
  background:black;
  color:lime;
  font-family:Arial;
  min-height:100%;
}
#reader{
  width:100vw;
  height:58vh;
  background:black;
  border:5px solid #111;
  box-sizing:border-box;
}
#manualArea{
  padding:10px;
  box-sizing:border-box;
  background:black;
  border-top:2px solid lime;
}
input{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  font-size:18px;
  background:#000;
  color:lime;
  border:2px solid lime;
  border-radius:10px;
}
button{
  width:100%;
  margin-top:8px;
  padding:14px;
  font-size:18px;
  font-weight:bold;
  background:lime;
  color:black;
  border:0;
  border-radius:10px;
}
#status,#ultimoId,#operadorBox,#rotaBox,#modoBox{
  margin-top:7px;
  font-size:14px;
  color:yellow;
}
#badgeLeitura{
  display:none;
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  z-index:1001;
  background:lime;
  color:black;
  padding:12px 20px;
  border-radius:14px;
  font-size:18px;
  font-weight:bold;
  box-shadow:0 0 20px lime;
}
#flash{
  position:fixed;
  inset:0;
  background:transparent;
  pointer-events:none;
  z-index:999;
}
#btnRetomar{
  display:none;
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:1002;
  width:90%;
  max-width:400px;
  background:#00ff00;
  color:#000;
  border:3px solid #fff;
  box-shadow:0 0 20px lime;
}
</style>
</head>

<body>

<div id="reader"></div>

<div id="manualArea">
  <input id="manualInput" placeholder="Digitar ID manualmente">
  <button onclick="enviarManual()">ENVIAR</button>
  <button onclick="pausarCamera()">⏸ PAUSAR SCANNER</button>

  <div id="rotaBox"></div>
  <div id="operadorBox"></div>
  <div id="modoBox"></div>
  <div id="ultimoId">Último ID: nenhum</div>
  <div id="status">Conectando...</div>
</div>

<div id="badgeLeitura">📦 Código bipado</div>
<button id="btnRetomar" onclick="retomarCamera()">▶ RETOMAR SCANNER</button>
<div id="flash"></div>

<script>
const params = new URLSearchParams(location.search);
const rota = params.get("rota") || "";

let operador = localStorage.getItem("operadorScanner");

if(!operador){
  operador = prompt("Nome de quem vai bipar:") || "OPERADOR";
  localStorage.setItem("operadorScanner", operador);
}

document.getElementById("rotaBox").innerText = "Rota: " + (rota || "sem rota");
document.getElementById("operadorBox").innerText = "Operador: " + operador;

const statusBox = document.getElementById("status");
const ultimoIdBox = document.getElementById("ultimoId");
const flash = document.getElementById("flash");
const readerBox = document.getElementById("reader");
const badgeLeitura = document.getElementById("badgeLeitura");
const btnRetomar = document.getElementById("btnRetomar");
const modoBox = document.getElementById("modoBox");

let ws;
let qr;
let ultimo = "";
let tempo = 0;
let bloqueado = false;
let ultimaBipagem = Date.now();
let cameraAtiva = false;

/* CONFIGURAÇÃO AUTOMÁTICA POR APARELHO */
const ua = navigator.userAgent;
const isIOS = /iPhone|iPad|iPod/i.test(ua);
const cpu = navigator.hardwareConcurrency || 4;

let configScanner;
let modoScanner = "";

if(isIOS){
  modoScanner = "Modo iPhone: leitura forte";
  configScanner = {
    fps: 25,
    qrbox: { width: 320, height: 320 },
    aspectRatio: 1.333,
    disableFlip: false
  };
}else if(cpu >= 8){
  modoScanner = "Modo Android forte";
  configScanner = {
    fps: 18,
    qrbox: { width: 360, height: 260 },
    aspectRatio: 1.777,
    disableFlip: false
  };
}else{
  modoScanner = "Modo Android econômico";
  configScanner = {
    fps: 14,
    qrbox: { width: 320, height: 230 },
    aspectRatio: 1.777,
    disableFlip: false
  };
}

modoBox.innerText = modoScanner;

function conectar(){
  const protocolo = location.protocol === "https:" ? "wss://" : "ws://";
  ws = new WebSocket(protocolo + location.host);

  ws.onopen = () => {
    status("Conectado ✔ Abrindo câmera...");
    iniciarCamera();
  };

  ws.onmessage = e => {
    let data;

    try{
      data = JSON.parse(e.data);
    }catch{
      return;
    }

    if(data.type !== "feedback") return;

    if(data.cor === "green"){
      feedback("green", 350, 600, "OK ✔");
    }

    if(data.cor === "yellow"){
      feedback("yellow", 1000, 1000, "Duplicado ⚠");
    }

    if(data.cor === "red"){
      feedback("red", 2000, 2000, "Fora de rota / inválido ✖");
    }
  };

  ws.onclose = () => {
    status("Reconectando...");
    setTimeout(conectar,1000);
  };

  ws.onerror = () => {
    status("Erro de conexão");
  };
}

function iniciarCamera(){
  if(cameraAtiva) return;

  if(typeof Html5Qrcode === "undefined"){
    status("Biblioteca da câmera não carregou");
    return;
  }

  if(!qr){
    qr = new Html5Qrcode("reader");
  }

  qr.start(
    { facingMode: "environment" },
    configScanner,
    txt => {
      if(bloqueado) return;
      if(!cameraAtiva) return;

      const agora = Date.now();

      if(txt === ultimo && agora - tempo < 900) return;

      ultimo = txt;
      tempo = agora;
      ultimaBipagem = Date.now();

      enviar(txt);
    },
    () => {}
  ).then(()=>{
    cameraAtiva = true;
    btnRetomar.style.display = "none";
    ultimaBipagem = Date.now();
    status("Câmera aberta");
  }).catch(err=>{
    status("Erro câmera: " + err);
  });
}

function pausarCamera(){
  if(!cameraAtiva) return;
  if(!qr) return;

  qr.stop().then(()=>{
    cameraAtiva = false;
    bloqueado = false;
    btnRetomar.style.display = "block";
    status("Scanner pausado. Toque em RETOMAR.");
  }).catch(()=>{
    cameraAtiva = false;
    btnRetomar.style.display = "block";
    status("Scanner pausado.");
  });
}

function retomarCamera(){
  btnRetomar.style.display = "none";
  ultimaBipagem = Date.now();
  status("Retomando câmera...");
  iniciarCamera();
}

/* ULTRA ECONOMIA: 15s SEM BIPAR PAUSA A CÂMERA */
setInterval(() => {
  if(!cameraAtiva) return;

  const parado = Date.now() - ultimaBipagem;

  if(parado > 15000){
    pausarCamera();
  }
}, 2000);

/* SE SAIR DA ABA, PAUSA CÂMERA */
document.addEventListener("visibilitychange", () => {
  if(document.hidden){
    pausarCamera();
  }
});

function enviar(valor){
  if(!valor) return;

  if(!ws || ws.readyState !== WebSocket.OPEN){
    status("Sem conexão");
    return;
  }

  bloqueado = true;

  setTimeout(()=>{
    bloqueado = false;
  },2500);

  ultimoIdBox.innerText = "Último ID: " + valor;
  status("Lido. Validando...");
  mostrarBadge();

  ws.send(JSON.stringify({
    type:"scan",
    valor:valor,
    rota:rota,
    operador:operador
  }));
}

function enviarManual(){
  if(bloqueado) return;

  const input = document.getElementById("manualInput");
  const valor = input.value.trim();

  if(!valor) return;

  ultimaBipagem = Date.now();
  enviar(valor);
  input.value="";
}

function feedback(cor, tempoCor, tempoBloqueio, textoStatus){
  bloqueado = true;
  ultimaBipagem = Date.now();

  if(cor === "green"){
    readerBox.style.borderColor = "lime";
    flash.style.background = "rgba(0,255,0,.25)";
  }

  if(cor === "yellow"){
    readerBox.style.borderColor = "yellow";
    flash.style.background = "rgba(255,230,0,.35)";
  }

  if(cor === "red"){
    readerBox.style.borderColor = "red";
    flash.style.background = "rgba(255,0,0,.70)";
    vibrarForte();
    tocarSomErro();
  }

  status(textoStatus);

  setTimeout(()=>{
    flash.style.background = "transparent";
    readerBox.style.borderColor = "#111";
  },tempoCor);

  setTimeout(()=>{
    bloqueado = false;
    status("Pronto para próxima leitura");
  },tempoBloqueio);
}

function mostrarBadge(){
  badgeLeitura.style.display = "block";

  setTimeout(()=>{
    badgeLeitura.style.display = "none";
  },700);
}

function tocarSomErro(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.frequency.value = 300;
    osc.type = "square";
    gain.gain.value = 0.35;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();

    setTimeout(()=>{
      osc.stop();
      ctx.close();
    },450);
  }catch(e){}
}

function vibrarForte(){
  if(navigator.vibrate){
    navigator.vibrate([600,100,600,100,800]);
  }
}

function status(t){
  statusBox.innerText = t;
}

conectar();
</script>

</body>
</html>
